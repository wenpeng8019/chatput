<svg width="32" height="32" viewBox="3.5 3.5 29 29" xmlns="http://www.w3.org/2000/svg">
  <!-- Chatput 菜单栏模板图标：聊天气泡 + 键盘按键，单色（黑/透明），用作 template image。 -->
  <!-- 同时体现 chat（气泡+尾巴）与 input（键盘按键）两层语义。 -->
  <g fill="#000000">
    <!-- 气泡外壳（圆角矩形 + 朝下尾巴），描边式（用 evenodd 挖空内部） -->
    <path d="M9 5 H27 A4 4 0 0 1 31 9 V21 A4 4 0 0 1 27 25 H19 L13 31 V25 H9 A4 4 0 0 1 5 21 V9 A4 4 0 0 1 9 5 Z
             M9 7.5 A1.5 1.5 0 0 0 7.5 9 V21 A1.5 1.5 0 0 0 9 22.5 H15.5 V26.5 L19.4 22.5 H27 A1.5 1.5 0 0 0 28.5 21 V9 A1.5 1.5 0 0 0 27 7.5 Z"
          fill-rule="evenodd"/>
    <!-- 气泡内：键盘按键（两排圆点 + 空格条），居中于内腔(中心 x=18, y=15) -->
    <!-- 第一排 -->
    <circle cx="12" cy="12" r="1.05"/>
    <circle cx="16" cy="12" r="1.05"/>
    <circle cx="20" cy="12" r="1.05"/>
    <circle cx="24" cy="12" r="1.05"/>
    <!-- 第二排 -->
    <circle cx="12" cy="15" r="1.05"/>
    <circle cx="16" cy="15" r="1.05"/>
    <circle cx="20" cy="15" r="1.05"/>
    <circle cx="24" cy="15" r="1.05"/>
    <!-- 空格键 -->
    <rect x="13" y="17.8" width="10" height="1.9" rx="0.95"/>
  </g>
</svg>
