name: ChatputDesktop
options:
  bundleIdPrefix: com.chatput
  deploymentTarget:
    macOS: "12.3"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    # 不开沙盒：需要全局辅助功能(AXObserver)与事件注入(CGEvent)，沙盒会禁止。
    ENABLE_HARDENED_RUNTIME: YES
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

targets:
  ChatputDesktop:
    type: application
    platform: macOS
    sources:
      - path: Sources
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: ChatPUT
        CFBundleName: ChatPUT
        LSMinimumSystemVersion: "12.3"
        NSHumanReadableCopyright: ""
        LSUIElement: true
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSLocalNetworkUsageDescription: "ChatPUT 需要局域网访问，以便在本机运行信令服务器并与手机配对。"
    entitlements:
      path: Sources/ChatputDesktop.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.cs.disable-library-validation: true
    dependencies:
      - framework: Frameworks/WebRTC.xcframework
        embed: true
    settings:
      base:
        PRODUCT_NAME: Chatput
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
        FRAMEWORK_SEARCH_PATHS:
          - "$(inherited)"
          - "$(PROJECT_DIR)/Frameworks"
