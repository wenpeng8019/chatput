name: ChatputDesktop
options:
  bundleIdPrefix: com.chatput
  deploymentTarget:
    macOS: "12.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    # 不开沙盒：需要全局辅助功能(AXObserver)与事件注入(CGEvent)，沙盒会禁止。
    ENABLE_HARDENED_RUNTIME: YES

targets:
  ChatputDesktop:
    type: application
    platform: macOS
    sources:
      - path: Sources
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: 聊入
        CFBundleName: ChatputDesktop
        LSMinimumSystemVersion: "12.0"
        NSHumanReadableCopyright: ""
        LSUIElement: false
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    entitlements:
      path: Sources/ChatputDesktop.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.cs.disable-library-validation: true
    dependencies:
      - framework: Frameworks/WebRTC.xcframework
        embed: true
    settings:
      base:
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
        FRAMEWORK_SEARCH_PATHS:
          - "$(inherited)"
          - "$(PROJECT_DIR)/Frameworks"
