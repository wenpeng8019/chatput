<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; connect-src ws: wss:;" />
  <title>Chatput</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 16px; }
    h1 { font-size: 16px; margin: 0 0 12px; }
    #status { font-size: 12px; color: #888; margin-bottom: 12px; }
    #status.connected { color: #2e9e44; }
    #qr { text-align: center; margin: 16px 0; }
    #qr img { width: 220px; height: 220px; }
    #code { font-family: ui-monospace, monospace; text-align: center; font-size: 13px; color: #666; }
    #log { font-size: 12px; background: rgba(127,127,127,.1); border-radius: 8px;
           padding: 8px; height: 220px; overflow: auto; white-space: pre-wrap; }
    .label { font-size: 12px; color: #999; margin: 10px 0 4px; }
  </style>
</head>
<body>
  <h1>📡 Chatput · 桌面端</h1>
  <div id="status">未连接信令服务器…</div>

  <div class="label">扫码配对（手机 App 扫描）</div>
  <div id="qr"></div>
  <div id="code"></div>

  <div class="label">日志</div>
  <div id="log"></div>

  <script type="module" src="./renderer.js"></script>
</body>
</html>
